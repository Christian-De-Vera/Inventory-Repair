app = "inventory-repair"
primary_region = "sin"

[build]
  builder = "paketobuildpacks/builder:base"
  buildpacks = ["paketobuildpacks/python"]

[env]
  DJANGO_SETTINGS_MODULE = "ict_inventory.settings"
  DJANGO_DEBUG = "False"
  DJANGO_ALLOWED_HOSTS = "inventory-repair.fly.dev,localhost"

[experimental]
  allowed_public_ports = []
  auto_rollback = true

[[services]]
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  max_concurrent_requests = 25
  [[services.ports]]
    handlers = ["http"]
    port = 80
    [[services.ports]]
      handlers = ["tls", "http"]
      port = 443

[[services.tcp_checks]]
  grace_period = "1s"
  interval = "15s"
  restart_limit = 0
  timeout = "2s"