<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permission Denied - ICT Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: #f4f7fb;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .error-panel {
            width: 100%;
            max-width: 520px;
            background: #fff;
            border: 1px solid #e8edf3;
            border-radius: 8px;
            box-shadow: 0 16px 40px rgba(16, 24, 40, 0.08);
            padding: 32px;
            text-align: center;
        }
        .error-icon {
            width: 56px;
            height: 56px;
            display: inline-grid;
            place-items: center;
            border-radius: 8px;
            background: #fff3cd;
            color: #946200;
        }
    </style>
</head>
<body>
    <main class="error-panel">
        <div class="error-icon mb-3">
            <i class="bi bi-shield-lock fs-3"></i>
        </div>
        <h1 class="h3 fw-bold">Permission Denied</h1>
        <p class="text-muted mb-4">Your account does not have access to this action. Ask an admin to update your role if this is part of your work.</p>
        <div class="d-flex justify-content-center gap-2">
            <a href="{% url 'dashboard' %}" class="btn btn-primary">Back to Dashboard</a>
            {% if request.user.is_authenticated %}
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-secondary">Logout</button>
                </form>
            {% endif %}
        </div>
    </main>
</body>
</html>
