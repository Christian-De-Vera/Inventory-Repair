<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ICT Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: #f4f7fb;
        }
        .auth-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .auth-panel {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border: 1px solid #e8edf3;
            border-radius: 8px;
            box-shadow: 0 16px 40px rgba(16, 24, 40, 0.08);
            padding: 32px;
        }
        .brand-mark {
            width: 44px;
            height: 44px;
            display: inline-grid;
            place-items: center;
            border-radius: 8px;
            background: #0d6efd;
            color: #fff;
        }
    </style>
</head>
<body>
    <main class="auth-shell">
        <section class="auth-panel">
            <div class="d-flex align-items-center gap-3 mb-4">
                <div class="brand-mark"><i class="bi bi-box-seam fs-4"></i></div>
                <div>
                    <h1 class="h4 mb-0 fw-bold">ICT Inventory</h1>
                    <p class="text-muted mb-0 small">Sign in to continue</p>
                </div>
            </div>

            {% if form.non_field_errors %}
                <div class="alert alert-danger">{{ form.non_field_errors }}</div>
            {% endif %}

            <form method="post" novalidate>
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">
                <div class="mb-3">
                    <label class="form-label fw-semibold" for="{{ form.username.id_for_label }}">Username</label>
                    <input type="text" name="{{ form.username.html_name }}" id="{{ form.username.id_for_label }}" class="form-control form-control-lg" autofocus required>
                    {% for error in form.username.errors %}<div class="text-danger small mt-1">{{ error }}</div>{% endfor %}
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold" for="{{ form.password.id_for_label }}">Password</label>
                    <input type="password" name="{{ form.password.html_name }}" id="{{ form.password.id_for_label }}" class="form-control form-control-lg" required>
                    {% for error in form.password.errors %}<div class="text-danger small mt-1">{{ error }}</div>{% endfor %}
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Login</button>
            </form>

            <div class="text-center mt-4">
                <span class="text-muted small">No account yet?</span>
                <a href="{% url 'register' %}" class="fw-semibold text-decoration-none">Register</a>
            </div>
        </section>
    </main>
</body>
</html>
